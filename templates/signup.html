<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --deep: #050d1f;
            --navy: #0a1628;
            --blue-dark: #0f2044;
            --blue-mid: #1a3a6e;
            --blue: #1e4d9b;
            --blue-bright: #2563eb;
            --blue-light: #3b82f6;
            --blue-glow: #60a5fa;
            --blue-soft: #93c5fd;
            --white: #ffffff;
            --text-muted: #94a3b8;
            --border: rgba(59,130,246,0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 15% 20%, rgba(37,99,235,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 70% at 85% 80%, rgba(30,77,155,0.2) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, rgba(37,99,235,0.25), transparent 70%); animation-duration: 9s; }
        .orb-2 { width: 350px; height: 350px; bottom: -80px; right: -80px; background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%); animation-duration: 11s; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; top: 40%; right: 10%; background: radial-gradient(circle, rgba(96,165,250,0.12), transparent 70%); animation-duration: 7s; animation-delay: -2s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20px, 30px) scale(1.05); }
        }

        .auth-page {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(59,130,246,0.18);
            border-radius: 16px;
            box-shadow: 0 0 0 1px rgba(37,99,235,0.1), 0 24px 80px rgba(5,13,31,0.6), 0 0 60px rgba(37,99,235,0.08) inset;
            overflow: hidden;
            animation: slideUp 0.65s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(36px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue-bright), var(--blue-glow), var(--blue-bright), transparent);
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        .card-header {
            padding: 32px 36px 28px;
        }

        .header-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(37,99,235,0.4);
        }
        .header-icon svg { width: 22px; height: 22px; fill: white; }

        .auth-card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .card-header p { color: var(--text-muted); font-size: 14px; font-weight: 300; }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .section-label span {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--blue-glow);
            white-space: nowrap;
        }
        .section-line { flex: 1; height: 1px; background: var(--border); }

        .card-body { padding: 0 36px 36px; }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .role-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 13px 6px;
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .role-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(37,99,235,0.25), rgba(59,130,246,0.15));
            opacity: 0;
            transition: opacity 0.25s ease;
            border-radius: 10px;
        }
        .role-btn:hover { border-color: rgba(59,130,246,0.35); background: rgba(37,99,235,0.06); }
        .role-btn.active { border-color: var(--blue-bright); box-shadow: 0 0 16px rgba(37,99,235,0.3), 0 0 0 1px rgba(37,99,235,0.3) inset; }
        .role-btn.active::before { opacity: 1; }

        .role-icon { font-size: 18px; position: relative; z-index: 1; transition: transform 0.25s ease; }
        .role-btn.active .role-icon { transform: scale(1.2); }

        .role-label {
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
            transition: color 0.25s ease;
        }
        .role-btn.active .role-label { color: var(--blue-soft); }

        #role { display: none; }

        .input-group { margin-bottom: 14px; }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--blue-glow);
            margin-bottom: 7px;
            opacity: 0.8;
        }

        .input-wrapper { position: relative; }

        .input-wrapper .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            opacity: 0.35;
            pointer-events: none;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1px solid rgba(59,130,246,0.18);
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--white);
            outline: none;
            transition: all 0.22s ease;
            -webkit-appearance: none;
        }
        .input-group input::placeholder { color: rgba(148,163,184,0.45); }
        .input-group input:focus {
            border-color: var(--blue-bright);
            background: rgba(37,99,235,0.06);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15), 0 0 20px rgba(37,99,235,0.08);
        }
        .input-group small {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            color: rgba(96,165,250,0.6);
            font-style: italic;
            padding-left: 2px;
        }

        #unique-id-group {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease, margin-bottom 0.35s ease;
        }
        #unique-id-group.visible { max-height: 110px; opacity: 1; margin-bottom: 14px; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-row .input-group { margin-bottom: 0; }

        .strength-wrap { margin-top: 8px; margin-bottom: 14px; }
        .password-strength { display: flex; gap: 4px; }
        .strength-bar {
            flex: 1; height: 2px; border-radius: 2px;
            background: rgba(255,255,255,0.07);
            transition: background 0.3s ease;
        }
        .strength-bar.weak   { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
        .strength-bar.medium { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }
        .strength-bar.strong { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--blue-bright), var(--blue-light));
            color: var(--white);
            border: none;
            border-radius: 9px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            margin-top: 6px;
            box-shadow: 0 4px 24px rgba(37,99,235,0.35);
        }
        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.55s ease;
        }
        .auth-btn:hover::before { left: 100%; }
        .auth-btn:hover { background: linear-gradient(135deg, #1d4ed8, var(--blue-bright)); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(37,99,235,0.5); }
        .auth-btn:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }

        #message { margin-top: 12px; min-height: 16px; }
        #message p { padding: 10px 14px; border-radius: 8px; font-size: 13px; animation: fadeIn 0.3s ease; }
        #message p[style*="red"] { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5 !important; }
        #message p[style*="green"] { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .form-footer { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); }
        .form-footer a { color: var(--blue-glow); font-weight: 500; text-decoration: none; transition: color 0.2s; }
        .form-footer a:hover { color: var(--blue-soft); }

        @media (max-width: 520px) {
            .card-header, .card-body { padding-left: 22px; padding-right: 22px; }
            .input-row { grid-template-columns: 1fr; }
            .role-selector { grid-template-columns: repeat(2, 1fr); }
        }

        .input-group input.input-textarea {
            padding-left: 38px;
        }

    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="card-glow-line"></div>

            <div class="card-header">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
                </div>
                <h2>Create Account</h2>
                <p>Join us today — it only takes a minute.</p>
            </div>

            <div class="card-body">
                <div class="section-label">
                    <div class="section-line"></div>
                    <span>Select your role</span>
                    <div class="section-line"></div>
                </div>

                <div class="role-selector">
                    <button type="button" class="role-btn" data-role="police" onclick="selectRole('police')">
                        <span class="role-icon">🛡️</span>
                        <span class="role-label">Police</span>
                    </button>
                    <button type="button" class="role-btn" data-role="citizen" onclick="selectRole('citizen')">
                        <span class="role-icon">👤</span>
                        <span class="role-label">Citizen</span>
                    </button>
                    <button type="button" class="role-btn" data-role="lawyer" onclick="selectRole('lawyer')">
                        <span class="role-icon">⚖️</span>
                        <span class="role-label">Lawyer</span>
                    </button>
                    <button type="button" class="role-btn" data-role="judge" onclick="selectRole('judge')">
                        <span class="role-icon">🔨</span>
                        <span class="role-label">Judge</span>
                    </button>
                </div>

                <form id="signupForm" class="auth-form" autocomplete="off">
                    <select id="role" required style="display:none;">
                        <option value="">Select your role</option>
                        <option value="police">Police</option>
                        <option value="citizen">Citizen</option>
                        <option value="lawyer">Lawyer</option>
                        <option value="judge">Judge</option>
                    </select>

                    <div class="input-group" id="unique-id-group">
                        <label for="unique_id">Unique ID</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="text" class="input-textarea" id="unique_id" placeholder="POLxxx / LAWxxx / JUDxxx" />
                        </div>
                        <small>Police: POLxxx &nbsp;·&nbsp; Lawyer: LAWxxx &nbsp;·&nbsp; Judge: JUDxxx</small>
                    </div>

                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                            <input type="text" class="input-textarea" id="fullname" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
                            <input type="email" class="input-textarea" id="email" placeholder="example@mail.com" required>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                <input type="password" class="input-textarea" id="password" placeholder="Create password" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="confirm-password">Confirm</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                <input type="password" class="input-textarea" id="confirm-password" placeholder="Repeat password" required>
                            </div>
                        </div>
                    </div>

                    <div class="strength-wrap">
                        <div class="password-strength">
                            <div class="strength-bar" id="bar1"></div>
                            <div class="strength-bar" id="bar2"></div>
                            <div class="strength-bar" id="bar3"></div>
                            <div class="strength-bar" id="bar4"></div>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Create Account</button>

                    <div id="message"></div>

                    <div class="form-footer">
                        Already have an account? <a href="/login">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function selectRole(role) {
            const roleField = document.getElementById('role');
            roleField.value = role;

            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === role);
            });

            const uniqueGroup = document.getElementById('unique-id-group');
            const uniqueInput = document.getElementById('unique_id');
            if (role === 'police' || role === 'lawyer' || role === 'judge') {
                uniqueGroup.classList.add('visible');
                uniqueInput.required = true;
            } else {
                uniqueGroup.classList.remove('visible');
                uniqueInput.required = false;
            }
        }

        const roleField = document.getElementById('role');
        roleField.addEventListener('change', function() {
            selectRole(this.value);
        });

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const bars = ['bar1','bar2','bar3','bar4'].map(id => document.getElementById(id));
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
            const cls = strength <= 1 ? 'weak' : strength <= 2 ? 'medium' : 'strong';
            bars.forEach((bar, i) => {
                bar.className = 'strength-bar' + (i < strength ? ' ' + cls : '');
            });
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                document.getElementById('message').innerHTML = '<p style="color: red;">Passwords do not match</p>';
                return;
            }

            const data = {
                fullname: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                password: password,
                role: document.getElementById('role').value,
                unique_id: document.getElementById('unique_id').value.trim()
            };

            fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.error) {
                    document.getElementById('message').innerHTML = '<p style="color: red;">' + result.error + '</p>';
                } else {
                    document.getElementById('message').innerHTML = '<p style="color: green;">' + result.message + '<br>Your Unique ID: ' + result.unique_id + '</p>';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                }
            })
            .catch(error => {
                document.getElementById('message').innerHTML = '<p style="color: red;">An error occurred. Please try again.</p>';
            });
        });
    </script>
</body>
</html>
